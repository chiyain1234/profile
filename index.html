<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>/</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fcfcfc;
            color: #1a1a1a;
            font-family: "Helvetica Neue", Arial, sans-serif;
            letter-spacing: 0.1em;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* 中央の垂直線 */
        .line {
            width: 1px;
            height: 120px;
            background-color: #e0e0e0;
        }

        .left {
            text-align: right;
            color: #999;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .right {
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        a {
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 1px;
        }

        a:hover {
            opacity: 0.5;
        }

        @media (max-width: 480px) {
            .container { gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <span>Identity</span>
        <span>Major</span>
        <span>Interests</span>
        <span>Links</span>
    </div>

    <div class="line"></div>

    <div class="right">
        <span>Anonymous</span>
        <span>Electronics</span>
        <span>Hardware / Code</span>
        <span>
            <a href="./index.html">Status</a> / 
            <a href="https://github.com/">GitHub</a>
        </span>
    </div>
</div>

</body>
</html>
