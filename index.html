<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chiyain / Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #111111;
            --text-main: #eeeeee;
            --text-sub: #999999;
            --accent: #5865F2;
            --deco-line: rgba(238, 238, 238, 0.15);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            letter-spacing: 0.05em;
            
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            
            cursor: default;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            font-size: 13px;
            padding: 20px;
        }

        .header-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--deco-line);
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid var(--text-main);
            object-fit: cover;

            -webkit-user-drag: none;
            pointer-events: none; 
        }

        .info-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 15px 30px;
            padding: 10px 0;
        }

        .label {
            text-align: right;
            color: var(--text-sub);
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.15em;
        }

        .value {
            text-align: left;
            display: flex;
            gap: 10px;
            align-items: baseline;
            font-weight: 400;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s, border-bottom 0.2s;
            border-bottom: 1px solid transparent;
            
            -webkit-user-drag: none;
            cursor: pointer;
        }
        a:hover {
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
        }

        .user-id {
            color: var(--text-sub);
            font-size: 11px;
            letter-spacing: 0;
        }

        .discord-status-row {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            width: 100%;
            padding-top: 25px;
            border-top: 1px solid var(--deco-line);
        }

        .discord-badge {
            height: 60px; 
            display: block;
            transition: transform 0.2s, opacity 0.2s;
            -webkit-user-drag: none;
        }

        .discord-badge:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        @media (max-width: 400px) {
            .info-grid { font-size: 12px; gap: 12px 20px; }
            .avatar { width: 60px; height: 60px; }
            .discord-badge { height: 55px; }
        }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

<div class="container">
    <div class="header-area">
        <img src="./chiyain.png" alt="ちゃいん" class="avatar">
    </div>

    <div class="info-grid">
        <div class="label">User</div>
        <div class="value">
            <span>ちゃいん</span>
            <span class="user-id">Discord: n_n_e_</span>
        </div>

        <div class="label">Hobby</div>
        <div class="value">Minecraft / Gaming</div>

        <div class="label">Link</div>
        <div class="value">
            <a href="https://x.com/chiyain1234" target="_blank">X</a> / 
            <a href="https://github.com/chiyain1234">GitHub</a>
        </div>
    </div>

    <div class="discord-status-row">
        <a href="https://discord.com/users/922776570597376012" target="_blank">
            <img class="discord-badge" src="https://discord-readme-badge.vercel.app/api?id=922776570597376012" alt="Discord Status">
        </a>
    </div>
</div>

</body>
</html>
