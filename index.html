<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chiyain / Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #111111;
            --text-main: #eeeeee;
            --text-sub: #999999;
            --accent: #5865F2;
            --deco-line: rgba(238, 238, 238, 0.2); /* 装飾用の薄い白色 */
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            letter-spacing: 0.05em;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* 全体の間隔を少し広く */
            font-size: 13px;
            padding: 20px;
        }

        /* 装飾：アバターの下の線 */
        .header-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--deco-line);
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid var(--text-main);
            object-fit: cover;
        }

        .info-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 12px 25px;
            text-transform: uppercase;
            padding: 10px 0;
        }

        .label {
            text-align: right;
            color: var(--text-sub);
            font-weight: bold;
        }

        .value {
            text-align: left;
            display: flex;
            gap: 10px;
            align-items: baseline;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s, border-bottom 0.2s;
            border-bottom: 1px solid transparent; /* ホバー用の下線 */
        }
        a:hover {
            color: var(--accent);
            border-bottom: 1px solid var(--accent);
        }

        .user-id {
            color: var(--text-sub);
            font-size: 11px;
            letter-spacing: 0;
            text-transform: none; 
        }

        .discord-status-row {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            width: 100%;
            padding-top: 25px;
            border-top: 1px solid var(--deco-line);
        }

        .discord-badge {
            height: 60px; 
            display: block;
            transition: transform 0.2s, opacity 0.2s;
        }

        .discord-badge:hover {
            opacity: 0.9;
            transform: scale(1.02); 
        }

        @media (max-width: 400px) {
            .info-grid { font-size: 11px; gap: 10px 15px; }
            .avatar { width: 60px; height: 60px; }
            .discord-badge { height: 55px; }
            .container { gap: 20px; }
            .header-area { padding-bottom: 15px; }
            .discord-status-row { padding-top: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="./chiyain.png" alt="ちゃいん" class="avatar">
    </div>

    <div class="info-grid">
        <div class="label">User</div>
        <div class="value">
            <span>ちゃいん</span>
            <span class="user-id">Discord: n_n_e_</span>
        </div>

        <div class="label">Hobby</div>
        <div class="value">Minecraft / Gaming</div>

        <div class="label">Link</div>
        <div class="value">
            <a href="https://x.com/chiyain1234" target="_blank">X</a> / 
            <a href="https://github.com/chiyain1234">GitHub</a>
        </div>
    </div>

    <div class="discord-status-row">
        <a href="https://discord.com/users/922776570597376012" target="_blank">
            <img class="discord-badge" src="https://discord-readme-badge.vercel.app/api?id=922776570597376012" alt="Discord Status">
        </a>
    </div>
</div>

</body>
</html>
