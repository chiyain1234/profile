<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chiyain / Lab & Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #161616;
            --text-main: #eeeeee;
            --text-sub: #888888;
            --accent: #5865F2;
            --danger: #ff4d4d;
        }

        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif; user-select: none; -webkit-user-select: none;
            cursor: default; overflow-y: auto; padding: 40px 0;
        }

        .container {
            display: flex; flex-direction: column; align-items: center; gap: 30px; width: 90%; max-width: 500px;
        }

        /* 迷路エリア */
        .maze-board {
            position: relative; width: 280px; height: 180px; background: var(--panel);
            border: 1px solid #333; display: none; overflow: hidden;
        }
        .maze-board.active { display: block; }
        .wall { position: absolute; background: #333; }
        #goal { position: absolute; bottom: 10px; right: 10px; width: 40px; height: 40px; background: var(--accent); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; }

        /* プロフィールカード */
        .card {
            background: var(--panel); padding: 30px; border-radius: 12px; width: 100%;
            border: 1px solid #222; position: relative;
        }

        .header { text-align: center; border-bottom: 1px solid #222; padding-bottom: 20px; margin-bottom: 20px; }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--text-main);
            cursor: pointer; transition: transform 0.3s;
        }
        .avatar:hover { transform: scale(1.05); border-color: var(--accent); }

        .info-grid { display: grid; grid-template-columns: 80px 1fr; gap: 15px; margin-bottom: 20px; }
        .label { color: var(--text-sub); font-family: 'Montserrat'; font-size: 10px; text-transform: uppercase; align-self: center; }

        /* 隠しリンク */
        #secret-links { opacity: 0; pointer-events: none; transition: opacity 0.8s; }
        #secret-links.unlocked { opacity: 1; pointer-events: auto; }

        /* 便利ツールエリア */
        .tools-section { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .tool-box { background: var(--panel); border: 1px solid #222; border-radius: 8px; padding: 15px; }
        .tool-title { font-family: 'Montserrat'; font-size: 11px; color: var(--accent); margin-bottom: 10px; }
        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 8px; box-sizing: border-box; font-family: monospace; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .btn { background: #222; border: none; color: #fff; padding: 8px; cursor: pointer; font-size: 12px; }
        .btn:hover { background: #333; }

        a { color: var(--text-main); text-decoration: none; }
        a:hover { color: var(--accent); }

        .msg { font-size: 10px; color: var(--danger); text-align: center; height: 12px; margin-top: 5px; }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">

<div class="container">
    <div class="card">
        <div class="header">
            <img src="./chiyain.png" alt="ちゃいん" class="avatar" onclick="initMaze()">
            <div style="font-size: 9px; color: var(--text-sub); margin-top: 8px;">CLICK AVATAR TO START MAZE</div>
        </div>

        <div id="mazeBoard" class="maze-board" onmouseleave="failMaze()">
            <div class="wall" style="top:50px; left:0; width:200px; height:10px;"></div>
            <div class="wall" style="top:50px; left:230px; width:50px; height:10px;"></div>
            <div class="wall" style="top:100px; left:50px; width:230px; height:10px;"></div>
            <div id="goal" onmouseenter="clearMaze()">GOAL</div>
            <div id="maze-msg" style="position:absolute; top:5px; left:5px; font-size:9px; color:var(--danger);"></div>
        </div>

        <div class="info-grid">
            <div class="label">User</div>
            <div class="value">ちゃいん</div>
            <div class="label">Hobby</div>
            <div class="value">Minecraft / Electronics</div>
            <div class="label">Social</div>
            <div id="secret-links" class="value">
                <a href="https://x.com/chiyain1234" target="_blank">X</a> / 
                <a href="https://github.com/chiyain1234" target="_blank">GitHub</a>
            </div>
        </div>

        <div style="display:flex; justify-content:center; border-top:1px solid #222; padding-top:20px;">
            <a href="https://discord.com/users/922776570597376012" target="_blank">
                <img src="https://discord-readme-badge.vercel.app/api?id=922776570597376012" style="height:40px;">
            </a>
        </div>
    </div>

    <div class="tools-section">
        <div class="tool-box">
            <div class="tool-title">Quick Calculator</div>
            <input type="text" id="calc-display" readonly>
            <div class="calc-grid">
                <button class="btn" onclick="calcAppend('7')">7</button>
                <button class="btn" onclick="calcAppend('8')">8</button>
                <button class="btn" onclick="calcAppend('9')">9</button>
                <button class="btn" onclick="calcAppend('/')">/</button>
                <button class="btn" onclick="calcAppend('4')">4</button>
                <button class="btn" onclick="calcAppend('5')">5</button>
                <button class="btn" onclick="calcAppend('6')">6</button>
                <button class="btn" onclick="calcAppend('*')">*</button>
                <button class="btn" onclick="calcAppend('1')">1</button>
                <button class="btn" onclick="calcAppend('2')">2</button>
                <button class="btn" onclick="calcAppend('3')">3</button>
                <button class="btn" onclick="calcAppend('-')">-</button>
                <button class="btn" onclick="calcClear()">C</button>
                <button class="btn" onclick="calcAppend('0')">0</button>
                <button class="btn" onclick="calcSolve()">=</button>
                <button class="btn" onclick="calcAppend('+')">+</button>
            </div>
        </div>

        <div class="tool-box">
            <div class="tool-title">Bit Visualizer (HEX to BIN)</div>
            <input type="text" id="hexInput" placeholder="Enter Hex (e.g. FF)" oninput="convertHex()">
            <div id="binOutput" style="font-family:monospace; font-size:12px; margin-top:10px; color:var(--text-sub); word-break:break-all;"></div>
        </div>
    </div>
</div>

<script>
    // --- 迷路ロジック ---
    const maze = document.getElementById('mazeBoard');
    const secret = document.getElementById('secret-links');
    const msg = document.getElementById('maze-msg');

    function initMaze() {
        maze.classList.add('active');
        msg.innerText = "DON'T TOUCH WALLS / MOUSE OUT";
        secret.classList.remove('unlocked');
    }

    // 壁に触れた時の処理
    document.querySelectorAll('.wall').forEach(w => {
        w.addEventListener('mouseenter', failMaze);
    });

    function failMaze() {
        if(maze.classList.contains('active')) {
            maze.classList.remove('active');
            alert("MAZE FAILED: Course Out");
        }
    }

    function clearMaze() {
        maze.classList.remove('active');
        secret.classList.add('unlocked');
        alert("ACCESS GRANTED: Links Unlocked");
    }

    // --- 電卓ロジック ---
    const display = document.getElementById('calc-display');
    function calcAppend(val) { display.value += val; }
    function calcClear() { display.value = ''; }
    function calcSolve() {
        try { display.value = eval(display.value); }
        catch { display.value = 'Error'; }
    }

    // --- 電子系ツールロジック ---
    function convertHex() {
        const hex = document.getElementById('hexInput').value;
        const output = document.getElementById('binOutput');
        if(!hex) { output.innerText = ''; return; }
        try {
            let bin = parseInt(hex, 16).toString(2).padStart(8, '0');
            output.innerText = "BIN: " + bin.replace(/(.{4})/g, '$1 ');
        } catch {
            output.innerText = "Invalid Hex";
        }
    }
</script>

</body>
</html>
