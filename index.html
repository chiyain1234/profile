<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>PROFILE // PERSONAL INFOMATION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #ffffff; /* 純白 */
            --text-main: #000000; /* 純黒 */
            --text-sub: #888888; /* グレー */
            --accent: #0000ff; /* アクセントカラー（青） */
            --line-color: #e0e0e0; /* 線の色 */
            
            /* フォント設定：日本語はゴシック体、英数はジオメトリック（幾何学）調 */
            --font-family: 'Helvetica Neue', Helvetica, Arial, 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', Meiryo, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
            overflow: hidden; /* 全体はスクロールさせない */
        }

        /* 画面全体を分割するレイアウト */
        .wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- 左側：固定タイトルエリア --- */
        .left-panel {
            width: 30%;
            height: 100%;
            border-right: 1px solid var(--line-color);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .site-title {
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .main-heading {
            font-size: 8vw; /* 画面幅に応じた巨大な文字 */
            font-weight: 900;
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin: 0;
            transform: rotate(-90deg) translateX(-100%); /* 90度回転 */
            transform-origin: left top;
            position: absolute;
            bottom: 60px;
            left: 60px;
            white-space: nowrap;
        }

        /* --- 右側：スクロールコンテンツエリア --- */
        .right-panel {
            width: 70%;
            height: 100%;
            overflow-y: auto; /* ここだけスクロール */
            padding: 100px 10% 100px 10%;
        }

        /* セクション共通 */
        section {
            margin-bottom: 100px;
            position: relative;
        }

        .section-num {
            font-size: 12px;
            font-weight: 900;
            color: var(--accent);
            position: absolute;
            left: -40px;
            top: 5px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-sub);
            margin-bottom: 30px;
        }

        /* 名前エリア */
        .name-ja {
            font-size: 48px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.03em;
        }
        .name-en {
            font-size: 18px;
            font-weight: 300;
            color: var(--text-sub);
            margin: 5px 0 0 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* プロフィールテキスト */
        .profile-text {
            font-size: 18px;
            line-height: 1.8;
            font-weight: 400;
            max-width: 600px;
        }
        .highlight {
            font-weight: 700;
            border-bottom: 2px solid var(--accent);
        }

        /* タグ（スキル） */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tag {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 15px;
            border: 1px solid var(--text-main);
            border-radius: 0; /* 四角形 */
        }

        /* リンク */
        .link-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .link-list li {
            border-bottom: 1px solid var(--line-color);
        }
        .link-list a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            text-decoration: none;
            color: var(--text-main);
            font-size: 16px;
            font-weight: 700;
            transition: color 0.2s;
        }
        .link-list a:hover {
            color: var(--accent);
        }
        .arrow {
            font-size: 20px;
            font-weight: 300;
        }

        /* --- レスポンシブ（スマホ対応） --- */
        @media (max-width: 900px) {
            .wrapper { flex-direction: column; overflow-y: auto; }
            .left-panel { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--line-color); padding: 30px; }
            .main-heading { transform: none; position: static; font-size: 15vw; margin-top: 20px; }
            .right-panel { width: 100%; height: auto; padding: 50px 30px; overflow-y: visible; }
            section { margin-bottom: 60px; }
            .section-num { position: static; margin-bottom: 5px; }
            .name-ja { font-size: 32px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="left-panel">
        <div class="site-title">PORTFOLIO // 2024</div>
        <h1 class="main-heading">IDENTITY</h1>
    </div>

    <div class="right-panel">
        
        <section>
            <div class="section-num">01</div>
            <div class="section-title">Name</div>
            <p class="name-ja">USER_NAME</p>
            <p class="name-en">Your Handle Name</p>
        </section>

        <section>
            <div class="section-num">02</div>
            <div class="section-title">Profile</div>
            <p class="profile-text">
                大学で<span class="highlight">電子工学</span>を専攻している学生です。
                論理回路からプログラミングまで、ハードとソフトの境界に関心があります。
                趣味はMinecraftでの自動化回路ビルドと、自宅サーバーの管理です。
            </p>
        </section>

        <section>
            <div class="section-num">03</div>
            <div class="section-title">Interests</div>
            <div class="tag-container">
                <div class="tag">Circuit Design</div>
                <div class="tag">Verilog / VHDL</div>
                <div class="tag">Swift</div>
                <div class="tag">Python</div>
                <div class="tag">Minecraft Redstone</div>
                <div class="tag">Linux</div>
