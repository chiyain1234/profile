<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chiyain / Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #111111;
            --text-main: #eeeeee;
            --text-sub: #999999;
            --accent: #5865F2;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            letter-spacing: 0.05em;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            font-size: 13px;
        }

        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid var(--text-main);
            object-fit: cover;
            margin-bottom: 5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 12px 25px;
            /* 全体は大文字設定 */
            text-transform: uppercase;
        }

        .label {
            text-align: right;
            color: var(--text-sub);
            font-weight: bold;
        }

        .value {
            text-align: left;
            display: flex;
            gap: 10px;
            align-items: baseline;
        }

        a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover {
            color: var(--accent);
        }

        /* 修正：ここだけ大文字化を解除 */
        .user-id {
            color: var(--text-sub);
            font-size: 11px;
            letter-spacing: 0;
            margin-top: 2px;
            text-transform: none; 
        }

        @media (max-width: 400px) {
            .info-grid { font-size: 11px; gap: 10px 15px; }
            .avatar { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="./chiyain.png" alt="ちゃいん" class="avatar">

    <div class="info-grid">
        <div class="label">User</div>
        <div class="value">
            <span>ちゃいん</span>
            <span class="user-id">Discord: n_n_e_</span>
        </div>

        <div class="label">Status</div>
        <div class="value">Minecraft / Gaming</div>

        <div class="label">Link</div>
        <div class="value">
            <a href="https://x.com/chiyain1234" target="_blank">X</a> / 
            <a href="https://github.com/">GitHub</a>
        </div>
    </div>
</div>

</body>
</html>
