<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chiyain / Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;">

<div class="main-frame">
    <nav class="sidebar">
        <button class="nav-btn active" onclick="showView('profile', event)">USER</button>
        <button class="nav-btn" onclick="showView('colors', event)">COLORS</button>
        <button class="nav-btn" onclick="showView('calc', event)">CALC</button>
        <button class="nav-btn" onclick="showView('tool', event)">UNIT</button>
    </nav>

    <main class="content">
<section id="view-profile" class="view active">
    <div class="profile-header">
        <img src="./chiyain.png" alt="ちゃいん" class="avatar">
        <h2 class="title">ちゃいん</h2>
        <div class="header-line"></div>
        <p class="subtitle">ELECTRONICS / MINECRAFT / DEV</p>
        
        <div class="social-links">
            <a href="https://x.com/chiyain1234" target="_blank" class="clickable">X</a>
            <span class="sep">|</span>
            <a href="https://github.com/chiyain1234" target="_blank" class="clickable">GitHub</a>
        </div>
    </div>

    <div class="discord-area">
        <div class="area-label">CONNECTION STATUS</div>
        <a href="https://discord.com/users/922776570597376012" target="_blank" class="clickable">
            <img src="https://discord-readme-badge.vercel.app/api?id=922776570597376012" alt="Discord">
        </a>
    </div>
</section>

        <section id="view-colors" class="view">
            <div class="tool-wrap">
                <h3 class="tool-title">COLOR PICKER</h3>
                <div id="color-preview" class="color-display" style="background-color: #5865F2;">#5865F2</div>
                
                <div class="input-row">
                    <input type="color" id="color-picker" value="#5865f2" oninput="syncColor('picker')">
                    <input type="text" id="color-text" value="#5865F2" oninput="syncColor('text')" maxlength="7" placeholder="#000000">
                </div>

                <div class="color-grid">
                    <div class="c-box" style="background:#FF4B2B;" onclick="updateColor('#FF4B2B')"></div>
                    <div class="c-box" style="background:#FF416C;" onclick="updateColor('#FF416C')"></div>
                    <div class="c-box" style="background:#00B4DB;" onclick="updateColor('#00B4DB')"></div>
                    <div class="c-box" style="background:#00f2fe;" onclick="updateColor('#00f2fe')"></div>
                    <div class="c-box" style="background:#7ed56f;" onclick="updateColor('#7ed56f')"></div>
                    <div class="c-box" style="background:#28b485;" onclick="updateColor('#28b485')"></div>
                </div>
            </div>
        </section>

        <section id="view-calc" class="view">
            <div class="calc-wrap">
                <div class="calc-screen">
                    <div id="calc-formula"></div>
                    <div id="calc-target">0</div>
                </div>
                <div class="calc-grid">
                    <button class="c-btn op" onclick="calcAction('sin(')">sin</button>
                    <button class="c-btn op" onclick="calcAction('cos(')">cos</button>
                    <button class="c-btn op" onclick="calcAction('(')">(</button>
                    <button class="c-btn op" onclick="calcAction(')')">)</button>
                    <button class="c-btn" onclick="calcAction('7')">7</button>
                    <button class="c-btn" onclick="calcAction('8')">8</button>
                    <button class="c-btn" onclick="calcAction('9')">9</button>
                    <button class="c-btn op bold" onclick="calcClear()">AC</button>
                    <button class="c-btn" onclick="calcAction('4')">4</button>
                    <button class="c-btn" onclick="calcAction('5')">5</button>
                    <button class="c-btn" onclick="calcAction('6')">6</button>
                    <button class="c-btn op" onclick="calcAction('/')">÷</button>
                    <button class="c-btn" onclick="calcAction('1')">1</button>
                    <button class="c-btn" onclick="calcAction('2')">2</button>
                    <button class="c-btn" onclick="calcAction('3')">3</button>
                    <button class="c-btn op" onclick="calcAction('*')">×</button>
                    <button class="c-btn" onclick="calcAction('0')">0</button>
                    <button class="c-btn" onclick="calcAction('.')">.</button>
                    <button class="c-btn op" onclick="calcAction('-')">-</button>
                    <button class="c-btn op" onclick="calcAction('+')">+</button>
                    <button class="c-btn solve" onclick="calcSolve()">ENTER / =</button>
                </div>
            </div>
        </section>

        <section id="view-tool" class="view">
            <div class="tool-wrap">
                <h3 class="tool-title">UNIT MASTER</h3>
                <select id="unit-type" onchange="initUnit()">
                    <option value="base">RADIX (HEX to BIN)</option>
                    <option value="length">LENGTH (m to ft)</option>
                    <option value="weight">WEIGHT (kg to lb)</option>
                </select>
                <div class="field">
                    <label id="label-in">HEXADECIMAL</label>
                    <input type="text" id="unit-in" placeholder="Input value..." oninput="unitConvert()">
                </div>
                <div class="field">
                    <label id="label-out">BINARY RESULT</label>
                    <input type="text" id="unit-out" readonly placeholder="Result...">
                </div>
            </div>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
