<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chiyain // Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #0b0b0b;
            --text: #eeeeee;
            --sub: #777777;
            /* ステータスカラー */
            --online: #43b581;
            --idle: #faa61a;
            --dnd: #f04747;
            --offline: #747f8d;
        }

        body {
            margin: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            letter-spacing: 0.02em;
        }

        .container {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
        }

        /* アイコンとステータスドット */
        .avatar-wrapper {
            position: relative;
            width: 80px; height: 80px;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: #222; /* 読み込み用 */
            object-fit: cover;
        }

        .status-dot {
            position: absolute;
            bottom: 2px; right: 2px;
            width: 18px; height: 18px;
            border-radius: 50%;
            border: 3px solid var(--bg);
            background-color: var(--offline); /* 初期値 */
        }

        .info { text-align: center; }
        .name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .activity { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.1em; height: 14px; }

        .links {
            display: flex; gap: 15px; margin-top: 10px;
            font-size: 12px; font-weight: 600;
        }

        a { color: var(--text); text-decoration: none; border-bottom: 1px solid #333; padding-bottom: 2px; }
        a:hover { border-color: var(--text); }
    </style>
</head>
<body>

<div class="container">
    <div class="avatar-wrapper">
        <img id="discord-avatar" src="" alt="" class="avatar">
        <div id="status-dot" class="status-dot"></div>
    </div>

    <div class="info">
        <div class="name">ちゃいん</div>
        <div id="discord-activity" class="activity">Loading status...</div>
    </div>

    <div class="links">
        <a href="https://x.com/chiyain1234" target="_blank">X</a>
        <a href="./index.html">Activity</a>
        <a href="https://github.com/">GitHub</a>
    </div>
</div>

<script>
    const DISCORD_ID = "922776570597376012";

    async function fetchStatus() {
        try {
            const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
            const { data } = await response.json();

            // ステータスドットの色更新
            const dot = document.getElementById('status-dot');
            const statusColors = { online: '#43b581', idle: '#faa61a', dnd: '#f04747', offline: '#747f8d' };
            dot.style.backgroundColor = statusColors[data.discord_status] || statusColors.offline;

            // アイコンをDiscordから取得
            const avatarImg = document.getElementById('discord-avatar');
            if (data.discord_user.avatar) {
                const extension = data.discord_user.avatar.startsWith('a_') ? 'gif' : 'png';
                avatarImg.src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${data.discord_user.avatar}.${extension}`;
            }

            // アクティビティ（ゲーム名など）を表示
            const activityEl = document.getElementById('discord-activity');
            if (data.activities && data.activities.length > 0) {
                // カスタムステータス以外のゲーム等を表示
                const game = data.activities.find(a => a.type === 0);
                activityEl.innerText = game ? `Playing ${game.name}` : data.activities[0].state || "Online";
            } else {
                activityEl.innerText = data.discord_status === 'offline' ? "Offline" : "No Activity";
            }
        } catch (e) {
            console.error("Status error", e);
        }
    }

    // 初回実行と定期更新
    fetchStatus();
    setInterval(fetchStatus, 30000); // 30秒ごとに更新
</script>

</body>
</html>
