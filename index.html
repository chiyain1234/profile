<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chiyain / Advanced Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #111111;
            --text-main: #eeeeee;
            --text-sub: #666666;
            --accent: #5865F2;
            --danger: #ff3333;
            --success: #00ff88;
        }

        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Inter', sans-serif; user-select: none; -webkit-user-select: none;
            cursor: default; overflow: hidden;
        }

        .main-frame {
            display: grid; grid-template-columns: 100px 1fr;
            width: 95vw; max-width: 800px; height: 500px;
            background: var(--panel); border: 1px solid #222; border-radius: 12px; overflow: hidden;
        }

        /* サイドメニュー（ボタン） */
        .sidebar {
            background: #0a0a0a; border-right: 1px solid #222;
            display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 15px;
        }

        .nav-btn {
            width: 60px; height: 60px; background: #161616; border: 1px solid #333;
            color: var(--text-sub); border-radius: 8px; cursor: pointer;
            font-family: 'Montserrat'; font-size: 9px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 5px; transition: all 0.2s;
        }
        .nav-btn:hover { border-color: var(--accent); color: #fff; background: #1a1a1a; }
        .nav-btn.active { border-color: var(--accent); color: var(--accent); background: #1a1a25; }

        /* コンテンツエリア */
        .content { position: relative; padding: 30px; display: flex; flex-direction: column; }
        .view { display: none; height: 100%; }
        .view.active { display: block; }

        /* 迷路（超複雑版） */
        .maze-container {
            width: 100%; height: 350px; background: #000; position: relative;
            border: 1px solid #333; overflow: hidden; cursor: crosshair;
        }
        .wall { position: absolute; background: #333; transition: background 0.1s; }
        .wall:hover { background: var(--danger); }
        #goal { position: absolute; bottom: 5px; right: 5px; padding: 10px; background: var(--success); color: #000; font-weight: bold; border-radius: 4px; font-size: 10px; }

        /* 関数電卓 */
        .calc-wrap { max-width: 350px; margin: 0 auto; }
        #calc-display {
            width: 100%; height: 50px; background: #000; border: 1px solid #333;
            color: var(--accent); font-family: 'JetBrains Mono'; font-size: 18px;
            text-align: right; padding: 10px; box-sizing: border-box; margin-bottom: 10px;
        }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .c-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; cursor: pointer; font-size: 12px; }
        .c-btn:hover { background: #222; }
        .c-btn.op { color: var(--accent); }

        /* 変換ツール */
        .tool-row { margin-bottom: 15px; }
        .tool-row label { display: block; font-size: 10px; color: var(--text-sub); margin-bottom: 5px; font-family: 'Montserrat'; }
        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 10px; box-sizing: border-box; font-family: 'JetBrains Mono'; }

        /* プロフィール隠し要素 */
        #secret-links { display: none; margin-top: 20px; text-align: center; font-weight: bold; color: var(--success); }

        .status-badge { font-size: 9px; color: var(--text-sub); position: absolute; bottom: 10px; right: 10px; }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;">

<div class="main-frame">
    <div class="sidebar">
        <button class="nav-btn active" onclick="showView('profile')">USER</button>
        <button class="nav-btn" onclick="showView('maze')">MAZE</button>
        <button class="nav-btn" onclick="showView('calc')">CALC</button>
        <button class="nav-btn" onclick="showView('tool')">CONV</button>
    </div>

    <div class="content">
        <div id="view-profile" class="view active">
            <div style="text-align: center; margin-top: 20px;">
                <img src="./chiyain.png" alt="ちゃいん" style="width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--text-main);">
                <h2 style="font-family: 'Montserrat'; letter-spacing: 0.1em; margin: 15px 0 5px;">ちゃいん</h2>
                <p style="font-size: 11px; color: var(--text-sub);">ELECTRONICS / MINECRAFT / DEV</p>
                
                <div id="secret-links">
                    <a href="https://x.com/chiyain1234" target="_blank">X</a> / 
                    <a href="https://github.com/chiyain1234" target="_blank">GitHub</a>
                </div>
            </div>
            <div style="margin-top: 50px; text-align: center;">
                <a href="https://discord.com/users/922776570597376012" target="_blank">
                    <img src="https://discord-readme-badge.vercel.app/api?id=922776570597376012" style="height: 45px;">
                </a>
            </div>
        </div>

        <div id="view-maze" class="view">
            <p style="font-size: 10px; color: var(--danger); margin-bottom: 5px;">COURSE OUT = RESET EVERYTHING</p>
            <div class="maze-container" onmouseleave="resetMaze()">
                <div class="wall" style="top:40px; left:0; width:220px; height:10px;"></div>
                <div class="wall" style="top:80px; left:40px; width:10px; height:200px;"></div>
                <div class="wall" style="top:80px; left:40px; width:200px; height:10px;"></div>
                <div class="wall" style="top:120px; left:80px; width:200px; height:10px;"></div>
                <div class="wall" style="top:120px; left:80px; width:10px; height:150px;"></div>
                <div class="wall" style="top:270px; left:0; width:150px; height:10px;"></div>
                <div class="wall" style="top:200px; left:130px; width:10px; height:150px;"></div>
                <div class="wall" style="top:160px; left:170px; width:10px; height:150px;"></div>
                <div class="wall" style="top:40px; left:260px; width:10px; height:310px;"></div>
                
                <div id="goal" onmouseenter="mazeClear()">GOAL</div>
                <div style="position:absolute; top:5px; left:5px; font-size:9px;">START</div>
            </div>
        </div>

        <div id="view-calc" class="view">
            <div class="calc-wrap">
                <input type="text" id="calc-display" readonly>
                <div class="calc-grid">
                    <button class="c-btn op" onclick="calcFunc('sin')">sin</button>
                    <button class="c-btn op" onclick="calcFunc('cos')">cos</button>
                    <button class="c-btn op" onclick="calcFunc('sqrt')">√</button>
                    <button class="c-btn op" onclick="calcClear()">AC</button>
                    
                    <button class="c-btn" onclick="calcIn('7')">7</button>
                    <button class="c-btn" onclick="calcIn('8')">8</button>
                    <button class="c-btn" onclick="calcIn('9')">9</button>
                    <button class="c-btn op" onclick="calcIn('/')">÷</button>
                    
                    <button class="c-btn" onclick="calcIn('4')">4</button>
                    <button class="c-btn" onclick="calcIn('5')">5</button>
                    <button class="c-btn" onclick="calcIn('6')">6</button>
                    <button class="c-btn op" onclick="calcIn('*')">×</button>
                    
                    <button class="c-btn" onclick="calcIn('1')">1</button>
                    <button class="c-btn" onclick="calcIn('2')">2</button>
                    <button class="c-btn" onclick="calcIn('3')">3</button>
                    <button class="c-btn op" onclick="calcIn('-')">-</button>
                    
                    <button class="c-btn" onclick="calcIn('0')">0</button>
                    <button class="c-btn" onclick="calcIn('.')">.</button>
                    <button class="c-btn op" onclick="calcSolve()">=</button>
                    <button class="c-btn op" onclick="calcIn('+')">+</button>
                </div>
            </div>
        </div>

        <div id="view-tool" class="view">
            <div class="tool-row">
                <label>HEX (16進数)</label>
                <input type="text" id="hex-in" placeholder="FF" oninput="hexConv()">
            </div>
            <div class="tool-row">
                <label>DEC (10進数)</label>
                <input type="text" id="dec-in" placeholder="255" oninput="decConv()">
            </div>
            <div class="tool-row">
                <label>BIN (2進数)</label>
                <input type="text" id="bin-in" readonly>
            </div>
            <div class="tool-row">
                <label>ASCII</label>
                <input type="text" id="ascii-in" readonly>
            </div>
        </div>

        <div class="status-badge">SYSTEM_STATUS: STABLE</div>
    </div>
</div>

<script>
    // --- 画面切り替え ---
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- 迷路ロジック ---
    function resetMaze() {
        document.querySelectorAll('.wall').forEach(w => w.style.background = '#333');
        document.getElementById('secret-links').style.display = 'none';
    }
    document.querySelectorAll('.wall').forEach(w => {
        w.addEventListener('mouseenter', () => {
            w.style.background = 'var(--danger)';
            setTimeout(() => { alert("MAZE FAILED"); resetMaze(); showView('profile'); }, 10);
        });
    });
    function mazeClear() {
        alert("ACCESS UNLOCKED");
        document.getElementById('secret-links').style.display = 'block';
        showView('profile');
    }

    // --- 関数電卓 ---
    const display = document.getElementById('calc-display');
    function calcIn(v) { display.value += v; }
    function calcClear() { display.value = ''; }
    function calcSolve() {
        try { display.value = eval(display.value.replace(/×/g, '*').replace(/÷/g, '/')); }
        catch { display.value = 'Error'; }
    }
    function calcFunc(type) {
        let v = parseFloat(display.value);
        if (isNaN(v)) return;
        if(type === 'sin') display.value = Math.sin(v * Math.PI / 180).toFixed(4);
        if(type === 'cos') display.value = Math.cos(v * Math.PI / 180).toFixed(4);
        if(type === 'sqrt') display.value = Math.sqrt(v).toFixed(4);
    }

    // --- 変換ツール ---
    function hexConv() {
        let v = document.getElementById('hex-in').value;
        let dec = parseInt(v, 16);
        if(!isNaN(dec)) {
            document.getElementById('dec-in').value = dec;
            document.getElementById('bin-in').value = dec.toString(2).padStart(8, '0');
            document.getElementById('ascii-in').value = String.fromCharCode(dec);
        }
    }
    function decConv() {
        let dec = parseInt(document.getElementById('dec-in').value);
        if(!isNaN(dec)) {
            document.getElementById('hex-in').value = dec.toString(16).toUpperCase();
            document.getElementById('bin-in').value = dec.toString(2).padStart(8, '0');
            document.getElementById('ascii-in').value = String.fromCharCode(dec);
        }
    }
</script>

</body>
</html>
