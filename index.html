<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>system@portfolio: ~</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #00ff41; /* 昔のPCのようなグリーン */
            --dim-color: #008f11;
            --font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 走査線エフェクト（ブラウン管風） */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        .terminal {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .line {
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
        }

        .prompt::before {
            content: "guest@portfolio:~$ ";
            color: var(--dim-color);
        }

        .command {
            color: #fff;
            font-weight: bold;
        }

        .response {
            padding-left: 20px;
            color: var(--text-color);
            word-break: break-all;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: var(--text-color);
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px dashed var(--text-color);
        }
        a:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        /* タイピング風アニメーションの遅延設定 */
        .l1 { animation-delay: 0.5s; }
        .l2 { animation-delay: 1.0s; }
        .l3 { animation-delay: 1.5s; }
        .l4 { animation-delay: 2.0s; }
        .l5 { animation-delay: 2.5s; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @media (max-width: 600px) {
            body { font-size: 14px; padding: 15px; }
        }
    </style>
</head>
<body>

<div class="terminal">
    <div class="line l1">Last login: <span id="current-date"></span> from 127.0.0.1</div>
    
    <div class="line l2">
        <span class="prompt"></span><span class="command">whoami</span>
        <div class="response">Guest User / Anonymous</div>
    </div>

    <div class="line l3">
        <span class="prompt"></span><span class="command">fetch --status</span>
        <div class="response">
            [Major] Electronics<br>
            [Focus] Logic Circuits / Hardware Automation<br>
            [Tools] C, Python, Swift, Linux
        </div>
    </div>

    <div class="line l4">
        <span class="prompt"></span><span class="command">ls ./links</span>
        <div class="response">
            <a href="./index.html">activity_monitor.exe</a><br>
            <a href="https://github.com/" target="_blank">github_repository.sh</a>
        </div>
    </div>

    <div class="line l5">
        <span class="prompt"></span><span class="cursor"></span>
    </div>
</div>

<script>
    // 現在の時刻を表示する
    document.getElementById('current-date').innerText = new Date().toLocaleString();
</script>

</body>
</html>
